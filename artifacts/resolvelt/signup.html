<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — RESOLVELT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-card-header">
        <div class="logo">RESOLVE<span>LT</span></div>
        <p>Join your neighbors. Make your community better.</p>
      </div>

      <div class="auth-card-body">

        <div id="auth-error" class="hidden" style="background:#fde8e8;border:1px solid #f5c6c6;color:#c0392b;border-radius:8px;padding:.75rem 1rem;font-size:.875rem;"></div>

        <form id="signup-form" novalidate>

          <div class="form-group mb-2">
            <label class="form-label" for="display-name">Full Name</label>
            <input type="text" id="display-name" class="form-control" placeholder="Jane Smith" autocomplete="name" required>
            <span class="form-error hidden" id="name-error"></span>
          </div>

          <div class="form-group mb-2">
            <label class="form-label" for="email">Email address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" required>
            <span class="form-error hidden" id="email-error"></span>
          </div>

          <div class="form-group mb-2">
            <label class="form-label" for="password">Password <span style="color:var(--text-muted);font-weight:400;">(min. 6 characters)</span></label>
            <div style="position:relative;">
              <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="new-password" required style="padding-right:2.5rem;">
              <button type="button" id="toggle-pw" tabindex="-1" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text-muted);">👁️</button>
            </div>
            <!-- Password strength bar -->
            <div class="progress-bar mt-1" style="height:4px;">
              <div class="progress-fill" id="pw-strength-bar" style="width:0%;transition:width .3s,background .3s;"></div>
            </div>
            <span class="form-error hidden" id="pw-error"></span>
          </div>

          <div class="form-group mb-2">
            <label class="form-label" for="confirm-pw">Confirm Password</label>
            <input type="password" id="confirm-pw" class="form-control" placeholder="••••••••" autocomplete="new-password" required>
            <span class="form-error hidden" id="cpw-error"></span>
          </div>

          <!-- Account type -->
          <div class="form-group mb-2">
            <label class="form-label">Account Type</label>
            <div style="display:flex;gap:.75rem;flex-wrap:wrap;">
              <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.875rem;flex:1;min-width:120px;border:1.5px solid var(--border);border-radius:8px;padding:.6rem .85rem;transition:border-color .2s;" id="role-resident-label">
                <input type="radio" name="role" value="resident" checked style="accent-color:var(--primary);">
                🏘️ Resident
              </label>
              <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.875rem;flex:1;min-width:120px;border:1.5px solid var(--border);border-radius:8px;padding:.6rem .85rem;transition:border-color .2s;" id="role-admin-label">
                <input type="radio" name="role" value="admin" style="accent-color:var(--primary);">
                🛡️ Admin
              </label>
            </div>
            <span class="form-hint">Admins can update issue statuses and manage all reports.</span>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg mt-1" id="signup-btn">
            Create Account
          </button>

        </form>

        <div class="auth-divider">or</div>

        <button class="btn btn-ghost btn-block" id="google-btn" style="gap:.6rem;">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Sign up with Google
        </button>

      </div>

      <div class="auth-footer">
        Already have an account? <a href="./login.html">Sign in</a>
      </div>

    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="./script.js"></script>

  <script>
    /* ── Signup Page Logic ── */
    initFirebase();

    // Redirect if already logged in (suppressed during active signup to avoid race condition)
    let _signingUp = false;
    auth.onAuthStateChanged(u => { if (u && !_signingUp) location.href = "./dashboard.html"; });

    // Toggle password
    document.getElementById("toggle-pw").addEventListener("click", () => {
      const pw = document.getElementById("password");
      pw.type = pw.type === "password" ? "text" : "password";
    });

    // Password strength indicator
    document.getElementById("password").addEventListener("input", function () {
      const v   = this.value;
      const bar = document.getElementById("pw-strength-bar");
      let score = 0;
      if (v.length >= 6)  score++;
      if (v.length >= 10) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const pcts   = [0, 20, 40, 65, 85, 100];
      const colors = ["#e74c3c","#e74c3c","#f39c12","#f39c12","#27ae60","#27ae60"];
      bar.style.width      = pcts[score] + "%";
      bar.style.background = colors[score];
    });

    // Highlight selected role card
    document.querySelectorAll('[name="role"]').forEach(radio => {
      radio.addEventListener("change", () => {
        document.getElementById("role-resident-label").style.borderColor = "var(--border)";
        document.getElementById("role-admin-label").style.borderColor    = "var(--border)";
        document.getElementById(`role-${radio.value}-label`).style.borderColor = "var(--primary)";
      });
    });
    // Set default highlight
    document.getElementById("role-resident-label").style.borderColor = "var(--primary)";

    // Form submission
    document.getElementById("signup-form").addEventListener("submit", async e => {
      e.preventDefault();
      clearErrors();

      const name    = document.getElementById("display-name").value.trim();
      const email   = document.getElementById("email").value.trim();
      const pw      = document.getElementById("password").value;
      const cpw     = document.getElementById("confirm-pw").value;
      const role    = document.querySelector('[name="role"]:checked').value;
      let valid = true;

      if (!name)              { showFieldError("name-error",  "Name is required."); valid = false; }
      if (!isValidEmail(email))  { showFieldError("email-error", "Enter a valid email."); valid = false; }
      if (!isValidPassword(pw))  { showFieldError("pw-error",    "Password must be at least 6 characters."); valid = false; }
      if (pw !== cpw)         { showFieldError("cpw-error",   "Passwords do not match."); valid = false; }
      if (!valid) return;

      const btn = document.getElementById("signup-btn");
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> Creating account…`;

      _signingUp = true;
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, pw);
        await cred.user.updateProfile({ displayName: name });
        await ensureUserProfile(cred.user, { displayName: name, role });
        showToast("Account created! Welcome to RESOLVELT.", "success");
        location.href = "./dashboard.html";
      } catch (err) {
        _signingUp = false;
        btn.disabled = false;
        btn.textContent = "Create Account";
        const msg = err.code ? firebaseErrorMsg(err.code) : (err.message || "Something went wrong.");
        showAuthError(msg);
      }
    });

    // Google Sign-Up
    document.getElementById("google-btn").addEventListener("click", async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      _signingUp = true;
      try {
        const result = await auth.signInWithPopup(provider);
        const role = document.querySelector('[name="role"]:checked').value;
        await ensureUserProfile(result.user, { role });
        location.href = "./dashboard.html";
      } catch (err) {
        _signingUp = false;
        if (err.code !== "auth/popup-closed-by-user") showAuthError(firebaseErrorMsg(err.code));
      }
    });

    function showFieldError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.remove("hidden");
    }
    function clearErrors() {
      ["name-error","email-error","pw-error","cpw-error"].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = ""; el.classList.add("hidden");
      });
      document.getElementById("auth-error").classList.add("hidden");
    }
    function showAuthError(msg) {
      const el = document.getElementById("auth-error");
      el.textContent = msg; el.classList.remove("hidden");
    }
    function firebaseErrorMsg(code) {
      const msgs = {
        "auth/email-already-in-use": "That email is already registered. Try signing in.",
        "auth/weak-password":        "Password must be at least 6 characters.",
        "auth/invalid-email":        "Enter a valid email address.",
        "auth/network-request-failed": "Network error. Check your connection."
      };
      return msgs[code] || "Something went wrong. Please try again.";
    }
  </script>
</body>
</html>
