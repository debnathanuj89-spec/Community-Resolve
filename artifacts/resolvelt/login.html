<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — RESOLVELT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- ── Auth Page Wrapper ── -->
  <div class="auth-page">
    <div class="auth-card">

      <!-- Header -->
      <div class="auth-card-header">
        <div class="logo">RESOLVE<span>LT</span></div>
        <p>Sign in to report and track community issues</p>
      </div>

      <!-- Body -->
      <div class="auth-card-body">

        <!-- Error Banner -->
        <div id="auth-error" class="hidden" style="background:#fde8e8;border:1px solid #f5c6c6;color:#c0392b;border-radius:8px;padding:.75rem 1rem;font-size:.875rem;"></div>

        <!-- Login Form -->
        <form id="login-form" novalidate>

          <div class="form-group mb-2">
            <label class="form-label" for="email">Email address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" required>
            <span class="form-error hidden" id="email-error"></span>
          </div>

          <div class="form-group mb-2">
            <label class="form-label" for="password">
              Password
              <a href="#" id="forgot-link" style="font-weight:500;font-size:.8rem;float:right;margin-top:1px;">Forgot password?</a>
            </label>
            <div style="position:relative;">
              <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required style="padding-right:2.5rem;">
              <button type="button" id="toggle-pw" tabindex="-1" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text-muted);">👁️</button>
            </div>
            <span class="form-error hidden" id="pw-error"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg mt-1" id="login-btn">
            Sign In
          </button>

        </form>

        <div class="auth-divider">or continue with</div>

        <!-- Google Sign-In -->
        <button class="btn btn-ghost btn-block" id="google-btn" style="gap:.6rem;">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>

      </div>

      <!-- Footer Link -->
      <div class="auth-footer">
        Don't have an account? <a href="./signup.html">Create one free</a>
      </div>

    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay" id="forgot-modal">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <h3>Reset Password</h3>
        <button class="modal-close" data-close-modal>×</button>
      </div>
      <div class="modal-body">
        <p style="font-size:.875rem;color:var(--text-secondary);">Enter your email and we'll send you a reset link.</p>
        <div class="form-group">
          <label class="form-label" for="reset-email">Email</label>
          <input type="email" id="reset-email" class="form-control" placeholder="you@example.com">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close-modal>Cancel</button>
        <button class="btn btn-primary" id="send-reset-btn">Send Reset Link</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="./script.js"></script>

  <script>
    /* ── Login Page Logic ── */
    initFirebase();

    // Redirect if already logged in
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = "./dashboard.html";
    });

    // Toggle password visibility
    document.getElementById("toggle-pw").addEventListener("click", () => {
      const pw = document.getElementById("password");
      pw.type = pw.type === "password" ? "text" : "password";
    });

    // Form submission
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearErrors();

      const email = document.getElementById("email").value.trim();
      const pw    = document.getElementById("password").value;
      let valid   = true;

      if (!isValidEmail(email)) { showFieldError("email-error", "Enter a valid email."); valid = false; }
      if (!pw)                  { showFieldError("pw-error", "Password is required."); valid = false; }
      if (!valid) return;

      const btn = document.getElementById("login-btn");
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> Signing in…`;

      try {
        await auth.signInWithEmailAndPassword(email, pw);
        // onAuthStateChanged will redirect
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Sign In";
        showAuthError(firebaseErrorMsg(err.code));
      }
    });

    // Google Sign-In
    document.getElementById("google-btn").addEventListener("click", async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        const result = await auth.signInWithPopup(provider);
        await ensureUserProfile(result.user);
        window.location.href = "./dashboard.html";
      } catch (err) {
        if (err.code !== "auth/popup-closed-by-user") {
          showAuthError(firebaseErrorMsg(err.code));
        }
      }
    });

    // Forgot password
    document.getElementById("forgot-link").addEventListener("click", (e) => {
      e.preventDefault();
      document.getElementById("reset-email").value = document.getElementById("email").value;
      openModal("forgot-modal");
    });
    bindModalClose("forgot-modal");

    document.getElementById("send-reset-btn").addEventListener("click", async () => {
      const email = document.getElementById("reset-email").value.trim();
      if (!isValidEmail(email)) { showToast("Enter a valid email.", "warning"); return; }
      try {
        await auth.sendPasswordResetEmail(email);
        showToast("Reset link sent! Check your inbox.", "success");
        closeModal("forgot-modal");
      } catch (err) {
        showToast(firebaseErrorMsg(err.code), "error");
      }
    });

    // ── Helpers ──
    function showFieldError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove("hidden");
    }
    function clearErrors() {
      ["email-error","pw-error"].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = "";
        el.classList.add("hidden");
      });
      document.getElementById("auth-error").classList.add("hidden");
    }
    function showAuthError(msg) {
      const el = document.getElementById("auth-error");
      el.textContent = msg;
      el.classList.remove("hidden");
    }
    function firebaseErrorMsg(code) {
      const msgs = {
        "auth/user-not-found":       "No account found with that email.",
        "auth/wrong-password":       "Incorrect password. Please try again.",
        "auth/invalid-credential":   "Invalid email or password.",
        "auth/too-many-requests":    "Too many attempts. Please wait and try again.",
        "auth/user-disabled":        "This account has been disabled.",
        "auth/network-request-failed": "Network error. Check your connection.",
        "auth/email-already-in-use": "That email is already registered.",
        "auth/weak-password":        "Password must be at least 6 characters.",
        "auth/invalid-email":        "Enter a valid email address."
      };
      return msgs[code] || "Something went wrong. Please try again.";
    }
  </script>
</body>
</html>
